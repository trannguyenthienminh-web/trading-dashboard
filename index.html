<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<meta http-equiv="Content-Language" content="vi">
<title>Trading AI — Đăng nhập</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0a0b0e;
    --surface: #111318;
    --border:  #1e2028;
    --gold:    #f5c842;
    --text:    #e8eaf0;
    --muted:   #6b7080;
    --red:     #e74c3c;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(245,200,66,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,200,66,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .login-wrap {
    width: 100%;
    max-width: 400px;
    position: relative;
    z-index: 1;
  }

  /* Logo */
  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .logo-mark {
    width: 44px; height: 44px;
    background: var(--gold);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 600; color: #0a0b0e;
  }
  .logo-name { font-size: 1.25rem; font-weight: 700; }
  .logo-name span { color: var(--gold); }

  /* Card */
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
  }
  .login-card h2 {
    font-size: 1.25rem; font-weight: 700;
    margin-bottom: 6px;
  }
  .login-card p {
    font-size: 0.875rem; color: var(--muted);
    margin-bottom: 28px;
  }

  /* Form */
  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 0.75rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    padding: 11px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9375rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--gold); }
  .field input::placeholder { color: var(--muted); }

  /* Error */
  .error-msg {
    display: none;
    font-size: 0.8125rem;
    color: var(--red);
    background: rgba(231,76,60,0.08);
    border: 1px solid rgba(231,76,60,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 16px;
  }
  .error-msg.show { display: block; }

  /* Button */
  .btn-login {
    width: 100%;
    padding: 13px;
    background: var(--gold);
    color: #0a0b0e;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9375rem;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 6px;
  }
  .btn-login:hover { opacity: 0.88; }
  .btn-login:active { opacity: 0.75; }

  /* Footer */
  .login-footer {
    margin-top: 20px;
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .login-footer a { color: var(--gold); }

  /* Ticker bar */
  .ticker {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .tick-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.8125rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
  }
  .tick-label { color: var(--muted); font-size: 0.75rem; }
  .tick-val { font-family: 'JetBrains Mono', monospace; font-weight: 500; }
  .tick-val.up { color: #2ecc71; }

  /* ── LANGUAGE SWITCHER (đồng bộ với dashboard.html) ── */
  .lang-switcher-fixed { position: fixed; top: 16px; right: 16px; z-index: 300; }
  .lang-switcher { position: relative; display: inline-block; }
  .lang-switcher__toggle {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    cursor: pointer; font-size: 12px;
    font-family: 'Space Grotesk', sans-serif;
    transition: background 0.15s ease;
  }
  .lang-switcher__toggle:hover { background: rgba(255,255,255,0.08); }
  .lang-switcher__code { font-weight: 600; letter-spacing: 0.5px; }
  .lang-switcher__menu {
    position: absolute; top: calc(100% + 6px); right: 0;
    min-width: 150px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    opacity: 0; visibility: hidden; transform: translateY(-4px);
    transition: opacity 0.15s ease, transform 0.15s ease, visibility 0.15s;
    z-index: 200;
  }
  .lang-switcher__menu.open { opacity: 1; visibility: visible; transform: translateY(0); }
  .lang-switcher__option {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 9px; border-radius: 5px;
    color: var(--text); font-size: 12px;
    transition: background 0.12s ease;
  }
  .lang-switcher__option:hover { background: rgba(255,255,255,0.06); }
  .lang-switcher__option.active { background: rgba(245,200,66,0.1); color: var(--gold); font-weight: 600; }
</style>
</head>
<body>

<!-- LANGUAGE SWITCHER -->
<div class="lang-switcher-fixed">
  <div class="lang-switcher">
    <button class="lang-switcher__toggle" id="langToggle" aria-label="Chọn ngôn ngữ / Select language">
      <span class="lang-switcher__code" id="currentCode">VI</span>
      <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <div class="lang-switcher__menu" id="langMenu">
      <a href="#" class="lang-switcher__option" data-lang-option="vi">Tiếng Việt</a>
      <a href="#" class="lang-switcher__option" data-lang-option="en">English</a>
    </div>
  </div>
</div>

<div class="login-wrap">

  <!-- Logo -->
  <div class="logo">
    <div class="logo-mark">AI</div>
    <div class="logo-name">Trading<span>AI</span> Dashboard</div>
  </div>

  <!-- Ticker mini -->
  <div class="ticker" id="ticker">
    <div class="tick-item">
      <span class="tick-label">XAU/USD</span>
      <span class="tick-val up" id="t-xau">—</span>
    </div>
    <div class="tick-item">
      <span class="tick-label">BTC/USD</span>
      <span class="tick-val up" id="t-btc">—</span>
    </div>
    <div class="tick-item">
      <span class="tick-label">EUR/USD</span>
      <span class="tick-val up" id="t-eur">—</span>
    </div>
  </div>

  <!-- Login card -->
  <div class="login-card">
    <h2 data-i18n="login.title">Đăng nhập</h2>
    <p data-i18n="login.subtitle">Nhập thông tin tài khoản được cấp để tiếp tục.</p>

    <div class="error-msg" id="errMsg" data-i18n="login.error_wrong">Sai tên đăng nhập hoặc mật khẩu!</div>

    <div class="field">
      <label data-i18n="login.label_username">Tên đăng nhập</label>
      <input type="text" id="username" placeholder="username" autocomplete="username" />
    </div>
    <div class="field">
      <label data-i18n="login.label_password">Mật khẩu</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doLogin()" />
    </div>

    <button class="btn-login" onclick="doLogin()" data-i18n="login.btn_login">Đăng nhập</button>
  </div>

  <div class="login-footer">
    <span data-i18n="login.footer_line1">Hệ thống dành riêng cho thành viên · © 2026 Trading AI</span><br/>
    <a href="https://trading-landing-lac.vercel.app" target="_blank" data-i18n="login.footer_back">← Về trang giới thiệu</a>
  </div>

</div>

<script src="/js/i18n.js" defer></script>
<script>
  // Toggle dropdown ngôn ngữ (đồng bộ với dashboard.html)
  (function () {
    document.addEventListener('DOMContentLoaded', () => {
      const toggle = document.getElementById('langToggle');
      const menu = document.getElementById('langMenu');
      const codeEl = document.getElementById('currentCode');
      const CODES = { vi: 'VI', en: 'EN' };

      function syncToggleDisplay() {
        const lang = window.ThienMinhGoldI18n ? window.ThienMinhGoldI18n.getCurrentLang() : 'vi';
        codeEl.textContent = CODES[lang];
      }

      toggle.addEventListener('click', (e) => {
        e.stopPropagation();
        menu.classList.toggle('open');
      });
      document.addEventListener('click', () => menu.classList.remove('open'));
      document.querySelectorAll('[data-lang-option]').forEach((opt) => {
        opt.addEventListener('click', () => {
          menu.classList.remove('open');
          setTimeout(syncToggleDisplay, 50);
        });
      });
      setTimeout(syncToggleDisplay, 150);
    });
  })();
</script>
<script>
  // ── TÀI KHOẢN (thêm/sửa ở đây) ──────────────────────────
  const ACCOUNTS = {
    "admin":   "admin123",
    "xuyen": "Xuyen1988@",
    "member2": "member123",
    "vip":     "vip2026",
  };

  function doLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const err = document.getElementById('errMsg');

    if (ACCOUNTS[u] && ACCOUNTS[u] === p) {
      sessionStorage.setItem('user', u);
      window.location.href = 'dashboard.html';
    } else {
      err.classList.add('show');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
      setTimeout(() => err.classList.remove('show'), 3000);
    }
  }

  // ── Lấy giá realtime ──────────────────────────────────────
  async function fetchPrices() {
    try {
      const res = await fetch(
        'https://trading-proxy.trannguyenthienminh.workers.dev/prices',
        { signal: AbortSignal.timeout(5000) }
      );
      const d = await res.json();
      if (d.xauusd) document.getElementById('t-xau').textContent = Number(d.xauusd).toFixed(2);
      if (d.btcusd) document.getElementById('t-btc').textContent = Number(d.btcusd).toFixed(0);
      if (d.eurusd) document.getElementById('t-eur').textContent = Number(d.eurusd).toFixed(5);
    } catch {}
  }

  document.addEventListener('DOMContentLoaded', () => {
    // Redirect nếu đã đăng nhập
    if (sessionStorage.getItem('user')) {
      window.location.href = 'dashboard.html';
    }
    fetchPrices();
    document.getElementById('username').focus();
  });
</script>

</body>
</html>
