<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — License Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0b0e;--surface:#111318;--card:#161820;--border:#1e2028;--gold:#f5c842;--text:#e8eaf0;--muted:#6b7080;--green:#2ecc71;--red:#e74c3c;--blue:#3498db;--r:10px; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;}
  a{color:inherit;text-decoration:none;}

  /* Login */
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
  .login-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:36px;width:100%;max-width:380px;}
  .login-box h2{font-size:1.25rem;margin-bottom:24px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .field input{width:100%;padding:10px 13px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none;}
  .field input:focus{border-color:var(--gold);}
  .btn{padding:10px 20px;border:none;border-radius:7px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s;}
  .btn-gold{background:var(--gold);color:#000;}
  .btn-gold:hover{opacity:.85;}
  .btn-sm{padding:6px 14px;font-size:12px;}
  .btn-green{background:rgba(46,204,113,.15);border:1px solid rgba(46,204,113,.3);color:var(--green);}
  .btn-red{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.25);color:var(--red);}
  .btn-blue{background:rgba(52,152,219,.12);border:1px solid rgba(52,152,219,.25);color:var(--blue);}
  .btn-muted{background:var(--card);border:1px solid var(--border);color:var(--muted);}

  /* App */
  #app{display:none;}
  nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
  .nav-logo{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;}
  .nav-logo span{color:var(--gold);}
  .admin-badge{font-size:10px;font-weight:700;background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.3);color:var(--red);padding:2px 8px;border-radius:4px;}

  .main{max-width:1200px;margin:0 auto;padding:24px 20px;}

  /* Stats row */
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
  .stat-label{font-size:11px;color:var(--muted);margin-bottom:6px;}
  .stat-val{font-size:1.5rem;font-weight:700;}
  .stat-val.gold{color:var(--gold);}
  .stat-val.green{color:var(--green);}
  .stat-val.red{color:var(--red);}

  /* Tabs */
  .tabs{display:flex;gap:4px;margin-bottom:20px;}
  .tab{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;background:none;border:none;color:var(--muted);transition:all .15s;}
  .tab:hover{color:var(--text);background:var(--card);}
  .tab.active{color:var(--gold);background:rgba(245,200,66,.08);}

  /* Table */
  .tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{background:var(--card);padding:11px 14px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
  td{padding:12px 14px;border-top:1px solid var(--border);}
  tr:hover td{background:rgba(255,255,255,.015);}
  .mono{font-family:'JetBrains Mono',monospace;font-size:12px;}
  .badge{display:inline-block;padding:2px 10px;border-radius:100px;font-size:11px;font-weight:700;}
  .badge-pending{background:rgba(245,200,66,.12);color:var(--gold);border:1px solid rgba(245,200,66,.3);}
  .badge-active{background:rgba(46,204,113,.12);color:var(--green);border:1px solid rgba(46,204,113,.3);}
  .badge-expired{background:rgba(107,112,128,.1);color:var(--muted);border:1px solid var(--border);}
  .badge-revoked{background:rgba(231,76,60,.12);color:var(--red);border:1px solid rgba(231,76,60,.25);}
  .badge-ib{background:rgba(52,152,219,.12);color:var(--blue);border:1px solid rgba(52,152,219,.25);}
  .badge-rental{background:rgba(245,200,66,.08);color:var(--gold);border:1px solid rgba(245,200,66,.2);}

  /* Modal */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px;}
  .modal-bg.show{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;width:100%;max-width:480px;}
  .modal h3{font-size:1.125rem;margin-bottom:20px;}
  .modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}

  .empty{padding:40px;text-align:center;color:var(--muted);font-size:13px;}
  .loading{padding:30px;text-align:center;color:var(--muted);}

  @media(max-width:700px){.stats-row{grid-template-columns:1fr 1fr;} .tab{padding:7px 12px;font-size:12px;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h2>🔐 Admin Panel</h2>
    <div class="field"><label>Mật khẩu admin</label><input type="password" id="admin-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')adminLogin()"></div>
    <button class="btn btn-gold" style="width:100%" onclick="adminLogin()">Đăng nhập</button>
    <div id="login-err" style="margin-top:12px;font-size:13px;color:var(--red);display:none;">Sai mật khẩu!</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav>
    <div class="nav-logo">Trading<span>AI</span> <span class="admin-badge">ADMIN</span></div>
    <div style="display:flex;gap:10px;align-items:center;">
      <a href="dashboard.html" style="font-size:13px;color:var(--muted);">← Dashboard</a>
      <button class="btn btn-muted btn-sm" onclick="adminLogout()">Đăng xuất</button>
    </div>
  </nav>

  <div class="main">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Tổng đăng ký</div><div class="stat-val" id="s-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Chờ duyệt</div><div class="stat-val gold" id="s-pending">—</div></div>
      <div class="stat-card"><div class="stat-label">Đang hoạt động</div><div class="stat-val green" id="s-active">—</div></div>
      <div class="stat-card"><div class="stat-label">Đã thu hồi</div><div class="stat-val red" id="s-revoked">—</div></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('pending',this)">⏳ Chờ duyệt</button>
      <button class="tab" onclick="switchTab('active',this)">✅ Đang dùng</button>
      <button class="tab" onclick="switchTab('all',this)">📋 Tất cả</button>
    </div>

    <!-- Table -->
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>Tên</th>
            <th>Telegram</th>
            <th>MT5 Account</th>
            <th>Broker</th>
            <th>Gói</th>
            <th>License Key</th>
            <th>Trạng thái</th>
            <th>Ngày đăng ký</th>
            <th>Hết hạn</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody id="tbl-body">
          <tr><td colspan="10"><div class="loading">Đang tải...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- APPROVE MODAL -->
<div class="modal-bg" id="approve-modal">
  <div class="modal">
    <h3>✅ Duyệt đơn & Cấp License Key</h3>
    <input type="hidden" id="m-id">
    <div class="field"><label>Tên khách</label><input type="text" id="m-name" readonly style="opacity:.6"></div>
    <div class="field"><label>MT5 Account</label><input type="text" id="m-account" readonly style="opacity:.6"></div>
    <div class="field"><label>License Key (tự động tạo)</label><input type="text" id="m-key" style="font-family:monospace"></div>
    <div class="field"><label>Hết hạn (để trống = vĩnh viễn với IB)</label><input type="date" id="m-expire"></div>
    <div class="field"><label>Ghi chú</label><input type="text" id="m-note" placeholder="Ghi chú nội bộ..."></div>
    <div class="modal-actions">
      <button class="btn btn-muted" onclick="closeModal()">Hủy</button>
      <button class="btn btn-gold" onclick="approveSubmit()">Cấp Key & Duyệt</button>
    </div>
  </div>
</div>

<script>
  const API       = 'https://trading-proxy.trannguyenthienminh.workers.dev';
  const ADMIN_PASS = 'admin2026';   // ĐỔI MẬT KHẨU ADMIN Ở ĐÂY

  let currentTab  = 'pending';
  let allData     = [];

  // ── AUTH ──────────────────────────────────────────────────
  function adminLogin() {
    const pass = document.getElementById('admin-pass').value;
    if (pass === ADMIN_PASS) {
      sessionStorage.setItem('admin_auth', '1');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadData();
    } else {
      document.getElementById('login-err').style.display = 'block';
    }
  }
  function adminLogout() {
    sessionStorage.removeItem('admin_auth');
    location.reload();
  }

  // ── LOAD DATA ─────────────────────────────────────────────
  async function loadData() {
    try {
      const res  = await fetch(API + '/api/license/list', { signal: AbortSignal.timeout(8000) });
      const data = await res.json();
      allData = data.licenses || [];
      updateStats();
      renderTable(currentTab);
    } catch(e) {
      document.getElementById('tbl-body').innerHTML =
        '<tr><td colspan="10"><div class="empty">⚠️ Không kết nối được API. Đảm bảo START_BOT.bat đang chạy.</div></td></tr>';
    }
  }

  function updateStats() {
    document.getElementById('s-total').textContent   = allData.length;
    document.getElementById('s-pending').textContent = allData.filter(r=>r.status==='pending').length;
    document.getElementById('s-active').textContent  = allData.filter(r=>r.status==='active').length;
    document.getElementById('s-revoked').textContent = allData.filter(r=>r.status==='revoked').length;
  }

  function switchTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    renderTable(tab);
  }

  function renderTable(tab) {
    const data = tab === 'all' ? allData : allData.filter(r => {
      if (tab === 'pending') return r.status === 'pending';
      if (tab === 'active')  return r.status === 'active';
      return true;
    });

    if (!data.length) {
      document.getElementById('tbl-body').innerHTML =
        '<tr><td colspan="10"><div class="empty">Không có dữ liệu</div></td></tr>';
      return;
    }

    document.getElementById('tbl-body').innerHTML = data.map(r => `
      <tr>
        <td><strong>${r.name}</strong></td>
        <td style="color:#3498db">${r.telegram}</td>
        <td class="mono">${r.account}</td>
        <td style="font-size:12px;color:var(--muted)">${r.broker}</td>
        <td><span class="badge badge-${r.plan}">${r.plan === 'ib' ? '⭐ IB Free' : '💳 Rental'}</span></td>
        <td class="mono" style="font-size:11px">${r.license_key || '—'}</td>
        <td><span class="badge badge-${r.status}">${statusLabel(r.status)}</span></td>
        <td style="font-size:11px;color:var(--muted)">${r.created_at?.slice(0,10)||'—'}</td>
        <td style="font-size:11px;color:var(--muted)">${r.expires_at || '∞'}</td>
        <td>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            ${r.status === 'pending' ? `<button class="btn btn-green btn-sm" onclick="openApprove(${r.id})">✓ Duyệt</button>` : ''}
            ${r.status === 'active'  ? `<button class="btn btn-red btn-sm" onclick="revoke(${r.id})">✗ Thu hồi</button>` : ''}
            ${r.status === 'revoked' ? `<button class="btn btn-blue btn-sm" onclick="reactivate(${r.id})">↺ Kích hoạt</button>` : ''}
            ${r.telegram ? `<a href="https://t.me/${r.telegram.replace('@','')}" target="_blank" class="btn btn-muted btn-sm">TG</a>` : ''}
          </div>
        </td>
      </tr>`).join('');
  }

  function statusLabel(s) {
    return { pending:'⏳ Chờ duyệt', active:'✅ Đang dùng', revoked:'❌ Thu hồi', expired:'⌛ Hết hạn' }[s] || s;
  }

  // ── APPROVE ───────────────────────────────────────────────
  function openApprove(id) {
    const r = allData.find(x => x.id === id);
    if (!r) return;
    document.getElementById('m-id').value      = id;
    document.getElementById('m-name').value    = r.name;
    document.getElementById('m-account').value = r.account;
    document.getElementById('m-key').value     = genKey();
    // IB = không hết hạn, rental = 30 ngày
    if (r.plan === 'rental') {
      const d = new Date(); d.setDate(d.getDate() + 30);
      document.getElementById('m-expire').value = d.toISOString().slice(0,10);
    } else {
      document.getElementById('m-expire').value = '';
    }
    document.getElementById('approve-modal').classList.add('show');
  }

  function closeModal() {
    document.getElementById('approve-modal').classList.remove('show');
  }

  async function approveSubmit() {
    const id     = document.getElementById('m-id').value;
    const key    = document.getElementById('m-key').value;
    const expire = document.getElementById('m-expire').value;
    const note   = document.getElementById('m-note').value;

    try {
      const res = await fetch(API + '/api/license/approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: parseInt(id), license_key: key, expires_at: expire, note }),
      });
      const data = await res.json();
      if (data.success) { closeModal(); loadData(); alert('✅ Đã duyệt và cấp key!'); }
      else alert('Lỗi: ' + (data.error || 'Unknown'));
    } catch(e) { alert('Lỗi kết nối: ' + e.message); }
  }

  async function revoke(id) {
    if (!confirm('Thu hồi license này? EA của khách sẽ dừng hoạt động.')) return;
    try {
      await fetch(API + '/api/license/revoke', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id }),
      });
      loadData();
    } catch(e) { alert('Lỗi: ' + e.message); }
  }

  async function reactivate(id) {
    try {
      await fetch(API + '/api/license/reactivate', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id }),
      });
      loadData();
    } catch(e) { alert('Lỗi: ' + e.message); }
  }

  function genKey() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    const seg = () => Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
    return `SGR-${seg()}-${seg()}-${seg()}`;
  }

  // ── INIT ──────────────────────────────────────────────────
  if (sessionStorage.getItem('admin_auth') === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  }

  setInterval(loadData, 60000); // Tự refresh mỗi 1 phút
</script>
</body>
</html>
